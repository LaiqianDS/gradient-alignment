# Example run config. Load with:  python src/train.py --config experiments/cifar10_sgd.yaml
# Any field below can still be overridden on the CLI, e.g. --seed 7 --lr 0.05.
# Omitted fields fall back to the dataclass defaults in src/config.py.

# data & model
dataset: cifar10        # mnist | cifar10 | cifar100 | tiny_imagenet
model: cnn              # fc | cnn | resnet18

# optimisation
optimizer: sgd          # sgd | adam
lr: 0.05
batch_size: 128
epochs: 40
momentum: 0.9
weight_decay: 0.0005

# reproducibility
seed: 42

# metric probing
probe_size: 256         # M: per-sample grad batch. Peak mem ~ M * num_params * 4B.
metric_every_steps: 100 # densified cadence inside the early window
early_window_frac: 0.10 # first 10% of steps get dense measurement

# efficiency target (epochs-to-threshold); null disables it
threshold_acc: 0.80

# windows snapped post-hoc for the early-vs-late correlation analysis
windows: [0.05, 0.10, 0.25, 0.50, 1.0]

# active_metrics: null runs all registry metrics. Or pin a subset:
# active_metrics: [m_coherence, gwa, gsnr, normalized_variance]
